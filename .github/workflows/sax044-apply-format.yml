name: SAX-044 Apply Pinned Formatting

on:
  push:
    branches:
      - feature/SAX-044-synchronized-playback
    paths:
      - .github/workflows/sax044-apply-format.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out SAX-044 branch
        uses: actions/checkout@v6
        with:
          ref: feature/SAX-044-synchronized-playback
          fetch-depth: 0
      - name: Set up Node.js 24.18.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: npm
      - name: Install pinned npm
        run: npm install --global npm@11.6.2
      - name: Install dependencies
        run: npm ci
      - name: Stabilize event dependencies
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/components/transcription-synchronized-playback.tsx")
          content = path.read_text(encoding="utf-8")
          old = "  const events = revision?.events ?? [];\n  const timelineDuration = resolveTimelineDuration(events, mediaDuration);"
          new = "  const events = useMemo(() => revision?.events ?? [], [revision]);\n  const timelineDuration = resolveTimelineDuration(events, mediaDuration);"
          if old not in content:
              raise SystemExit("Expected SAX-044 events expression was not found")
          path.write_text(content.replace(old, new), encoding="utf-8")
          PY
      - name: Apply pinned Prettier
        run: npx prettier --write .
      - name: Verify lint without warnings
        run: npm run lint -- --max-warnings=0
      - name: Commit exact formatter output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs src
          git commit -m "refactor(SAX-044): apply pinned formatting"
          git push origin HEAD:feature/SAX-044-synchronized-playback
