name: SAX-045 Crypto Fixture

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: "24.18.0"
      - run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/lib/transcription-artifacts-coverage.test.ts')
          text = path.read_text()
          text = text.replace(
              'downloadRevisionArtifact(JOB_ID, 2, "midi", undefined, undefined)',
              'downloadRevisionArtifact(JOB_ID, 2, "midi", undefined, {} as Crypto)',
          )
          path.write_text(text)
          PY
          npx prettier --write src/lib/transcription-artifacts-coverage.test.ts
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/transcription-artifacts-coverage.test.ts
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "test(SAX-045): simulate unavailable Web Crypto explicitly"
          git push
