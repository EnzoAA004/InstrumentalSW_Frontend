name: SAX-045 README

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('README.md')
          text = path.read_text()
          if '## Download revision artifacts' not in text:
              text += '''

## Download revision artifacts

SAX-045 adds the reusable `Revision artifact downloads` panel to the read-only review, revision editor and synchronized playback screens. The browser calls only Spring Boot and supports already-materialized MIDI, MusicXML and SVG artifacts.

Metadata is validated completely. A binary download is accepted only after Content-Type, safe Content-Disposition filename, optional Content-Length, descriptor size and Web Crypto SHA-256 all match. The browser then creates a temporary Blob object URL, clicks a temporary `download` link and revokes/removes everything in `finally`.

No public storage URL, `window.open`, localStorage, IndexedDB, Cache API or service worker is used. PDF buttons are not shown.

The interface states:

```text
Downloads are retrieved through the Saxo product API.
No public storage URL is exposed.
```

MIDI, MusicXML and SVG download transport is implemented for registered artifacts. Artifact generation from a normal uploaded job remains pending. PDF is not implemented.

See `docs/contracts/revision-artifact-download-ui-v1.md` and `docs/tdd/iteration-006.md`.
'''
              path.write_text(text)
          PY
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "docs(SAX-045): document artifact download UI"
          git push
