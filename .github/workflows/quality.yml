name: Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: frontend-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - name: Set up Node.js 24.18.0
        uses: actions/setup-node@v6
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Install pinned npm
        run: npm install --global npm@11.6.2
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Run quality gate
        shell: bash
        run: |
          set -o pipefail
          npm run quality 2>&1 | tee quality.log
      - name: Apply pinned Prettier to documentation
        if: failure()
        run: npx prettier@3.9.6 --write docs/contracts/audio-upload-ui-v1.md
      - name: Commit formatted documentation
        if: failure()
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No documentation formatting changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/contracts/audio-upload-ui-v1.md
          git commit -m "style(SAX-040): format frontend upload contract"
          git push origin HEAD:${{ github.head_ref }}
      - name: Upload quality evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: frontend-quality-evidence
          path: |
            quality.log
            coverage/coverage-summary.json
          if-no-files-found: warn
          retention-days: 3
