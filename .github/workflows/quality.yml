name: Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: frontend-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - name: Set up Node.js 24.18.0
        uses: actions/setup-node@v6
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Install pinned npm
        run: npm install --global npm@11.6.2
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Run quality gate
        shell: bash
        run: |
          set -o pipefail
          npm run quality 2>&1 | tee quality.log
      - name: Apply pinned Prettier
        if: failure()
        run: npm run format
      - name: Commit formatter result
        if: failure()
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No formatter changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src vitest.config.ts
          git commit -m "style(SAX-040): apply pinned frontend formatter"
          git push origin HEAD:${{ github.head_ref }}
      - name: Upload failed quality log
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: frontend-quality-failure
          path: quality.log
          if-no-files-found: error
          retention-days: 3
