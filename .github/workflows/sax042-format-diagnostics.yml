name: SAX-042 Format Diagnostics

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js 24.18.0
        uses: actions/setup-node@v6
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Install pinned npm
        run: npm install --global npm@11.6.2
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Apply pinned Prettier
        run: npm run format
      - name: Upload formatted sources
        uses: actions/upload-artifact@v6
        with:
          name: sax042-frontend-formatted-sources
          path: |
            src/components/transcription-progress.tsx
            src/components/transcription-review.test.tsx
            src/components/transcription-review.tsx
            src/lib/transcription-review-api.test.ts
          retention-days: 1
